const DAYS_S1  = ["Quinta-feira","Sexta-feira","Sábado","Domingo","Segunda-feira","Terça-feira"];
const DATES_S1 = ["4 jun","5 jun","6 jun","7 jun","8 jun","9 jun"];
const DAYS_STD = ["Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

function buildSchedule(semNum, tasks) {
  const days  = semNum === 1 ? DAYS_S1  : DAYS_STD;
  const dates = semNum === 1 ? DATES_S1 : null;
  const slots = []; let idx = 0;
  for (let d = 0; d < days.length; d++) {
    const perDay = d < days.length - 1 ? 2 : tasks.length - idx;
    const day = { label: days[d], date: dates ? dates[d] : null, tasks: [] };
    for (let i = 0; i < perDay && idx < tasks.length; i++) day.tasks.push(tasks[idx++]);
    if (day.tasks.length) slots.push(day);
  }
  return slots;
}

const STORE_KEY = "crono_extensivo_v6";
const SEED = {
  progress: { "1-1-T":true,"1-1-Q":true, "1-2-T":true,"1-2-Q":true, "1-3-T":true,"1-3-Q":true },
  stats: { "1-1-Q":{q:23,a:14}, "1-2-Q":{q:28,a:17}, "1-3-Q":{q:29,a:23} }
};
let mem = {};
function loadState(){ try{const v=localStorage.getItem(STORE_KEY);return v?JSON.parse(v):SEED;}catch{return mem.s||SEED;} }
function saveState(s){ try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch{mem.s=s;} }
const pctColor = (p)=> p>=70?"#16A34A":p>=50?"#D97706":"#DC2626";

function Ring({pct, size=120, stroke=12, color, sub}) {
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-Math.min(pct,100)/100);
  return (
    <svg width={size} height={size} style={{display:"block"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset .7s ease"}}/>
      <text x="50%" y="47%" textAnchor="middle" fontSize={size*0.26} fontWeight="900" fill="#1E293B" fontFamily="Nunito">{pct}%</text>
      <text x="50%" y="64%" textAnchor="middle" fontSize={size*0.11} fontWeight="700" fill="#64748B" fontFamily="Nunito">{sub}</text>
    </svg>
  );
}

function Bars({data, fmt}) {
  const max = Math.max(...data.map(d=>d.value), 1);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      {data.map((d,i)=>(
        <div key={i}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:700,color:"#334155"}}>{d.ico} {d.label}</span>
            <span style={{fontSize:13,fontWeight:800,color:d.color}}>{fmt(d)}</span>
          </div>
          <div style={{background:"#E2E8F0",borderRadius:99,height:11,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.round(100*d.value/max)}%`,background:`linear-gradient(90deg,${d.color},${d.color}AA)`,borderRadius:99,transition:"width .6s ease",minWidth:d.value>0?6:0}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function ProgBar({label, done, total, pct, color, grad}) {
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.95)"}}>{label}</span>

        <div style={{height:"100%",width:`${pct}%`,background:grad,borderRadius:99,transition:"width .5s ease"}}/>
      </div>
    </div>
  );
}

                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontWeight:900,fontSize:18,color:isToday?"#0D9488":"#1E293B"}}>{day.label}</span>
                        {day.date && <span style={{fontSize:13,color:"#64748B",fontWeight:600}}>{day.date}</span>}
                        {isToday && <span style={{fontSize:10,padding:"3px 9px",borderRadius:99,background:"#CCFBF1",color:"#0D9488",letterSpacing:1,textTransform:"uppercase",fontWeight:800}}>hoje</span>}
                        {isComplete && <span style={{fontSize:10,padding:"3px 9px",borderRadius:99,background:"#DCFCE7",color:"#16A34A",letterSpacing:1,textTransform:"uppercase",fontWeight:800}}>✓ completo</span>}
                      </div>
                      <div style={{fontSize:12,color:"#64748B",fontWeight:600,marginTop:2}}>{day.tasks.length} tópicos · {dd}/{dt} feitas</div>
                    </div>
                    <div style={{flex:1,height:2,background:"#E2E8F0",borderRadius:2,marginLeft:4}}/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {day.tasks.map(t=>{
                      const [num,esp,titulo,pags,tops,uuid,qnum,isRev,cor,ico]=t;
                      const tId=`${sem}-${num}-T`,qId=`${sem}-${num}-Q`;
                      return (
                        <div key={num}>
                          <Card id={tId} {...{num,esp,titulo,pags,tops,cor,ico}} isRev={!!isRev} done={!!progress[tId]} isQ={false} qlink={null} qnum={0} stat={null} onStat={null} isOpen={open===tId} onToggle={()=>setOpen(open===tId?null:tId)} onDone={()=>toggle(tId)}/>
                          <div style={{marginLeft:16,marginTop:6}}>
                            <Card id={qId} {...{num,esp,cor,ico}} titulo={`Questões — ${titulo.replace(/ \(Teoria.*| \(Revisão.*/i,"")}`} pags={null} tops={tops} isRev={false} done={!!progress[qId]} isQ={true} qlink={qURL(uuid)} qnum={qnum} stat={stats[qId]} onStat={(f,v)=>setStat(qId,f,v)} isOpen={open===qId} onToggle={()=>setOpen(open===qId?null:qId)} onDone={()=>toggle(qId)}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          </div>{/* /main-col */}

          {/* ════════ DESEMPENHO LATERAL ════════ */}
          <div className="side-col">
            <div className="side-title">📊 Seu Desempenho</div>
            <Dashboard {...{progress,stats,doneAll,totalAll,pctAll,gQ,gA,gPct,ach}} />
          </div>{/* /side-col */}

        </div>{/* /layout */}
      </div>
    </div>
  );
}

function Dashboard({progress,stats,doneAll,totalAll,pctAll,gQ,gA,gPct,ach}) {
  const bySpec={};
  SEMKEYS.forEach(s=>{(RAW[String(s)]||[]).forEach(t=>{
    const [num,esp,,,,,,, cor,ico]=t;
    if(!bySpec[esp]) bySpec[esp]={esp,cor,ico,q:0,a:0,done:0,total:0};
    bySpec[esp].total++; if(progress[`${s}-${num}-T`]) bySpec[esp].done++;
    const st=stats[`${s}-${num}-Q`]; if(st){bySpec[esp].q+=Number(st.q)||0;bySpec[esp].a+=Number(st.a)||0;}
  });});
  const specs=Object.values(bySpec);
  const aprData=specs.filter(s=>s.q>0).map(s=>({label:s.esp,ico:s.ico,value:Math.round(100*s.a/s.q),color:pctColor(Math.round(100*s.a/s.q)),a:s.a,q:s.q})).sort((x,y)=>y.value-x.value);
  const volData=specs.filter(s=>s.q>0).map(s=>({label:s.esp,ico:s.ico,value:s.q,color:s.cor})).sort((x,y)=>y.value-x.value);
  const weekData=SEMKEYS.map(s=>{const t=RAW[String(s)]||[];const dn=t.reduce((a,tk)=>a+(progress[`${s}-${tk[0]}-T`]?1:0)+(progress[`${s}-${tk[0]}-Q`]?1:0),0);return {s,pct:t.length?Math.round(100*dn/(t.length*2)):0};});

  const card={background:"#fff",borderRadius:18,padding:"18px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"};
  const title={fontSize:17,fontWeight:800,color:"#1E293B",marginBottom:14,display:"flex",alignItems:"center",gap:8};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{...card,display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:10}}>
        <div style={{textAlign:"center"}}><Ring pct={pctAll} color="#7C3AED" sub={`${doneAll}/${totalAll}`}/><div style={{fontSize:14,fontWeight:800,color:"#7C3AED",marginTop:6}}>Cronograma</div></div>
        <div style={{textAlign:"center"}}><Ring pct={gPct||0} color={pctColor(gPct||0)} sub={`${gA}/${gQ} certas`}/><div style={{fontSize:14,fontWeight:800,color:pctColor(gPct||0),marginTop:6}}>Aproveitamento</div></div>
      </div>

      <div style={card}>
        <div style={title}>🏆 Conquistas <span style={{fontSize:13,fontWeight:700,color:"#64748B"}}>({ach.filter(a=>a.on).length}/{ach.length})</span></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(82px,1fr))",gap:10}}>
          {ach.map((a,i)=>(
            <div key={i} className={a.on?"pop":""} style={{textAlign:"center",padding:"12px 6px",borderRadius:14,background:a.on?"linear-gradient(135deg,#F0FDF4,#DCFCE7)":"#F8FAFC",border:`1px solid ${a.on?"#86EFAC":"#E2E8F0"}`,opacity:a.on?1:0.55}}>
              <div style={{fontSize:30,filter:a.on?"none":"grayscale(1)"}}>{a.ico}</div>
              <div style={{fontSize:12,fontWeight:800,color:a.on?"#16A34A":"#64748B",marginTop:4}}>{a.name}</div>
              <div style={{fontSize:10,color:"#64748B",marginTop:1}}>{a.desc}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={card}>
        <div style={title}>🎯 Aproveitamento por especialidade</div>
        {aprData.length? <Bars data={aprData} fmt={(d)=>`${d.value}% · ${d.a}/${d.q}`}/> : <div style={{fontSize:14,color:"#64748B",padding:"10px 0"}}>Registre questões para ver o gráfico.</div>}
      </div>

      <div style={card}>
        <div style={title}>📚 Questões feitas por especialidade</div>
        {volData.length? <Bars data={volData} fmt={(d)=>`${d.value} q`}/> : <div style={{fontSize:14,color:"#64748B",padding:"10px 0"}}>Nenhuma questão registrada ainda.</div>}
      </div>

      <div style={card}>
        <div style={title}>📈 Progresso por semana</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:120,padding:"0 2px"}}>
          {weekData.map(w=>(
            <div key={w.s} title={`Semana ${w.s}: ${w.pct}%`} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",height:"100%"}}>
              <div style={{width:"100%",height:`${Math.max(w.pct,2)}%`,background:w.pct===100?"linear-gradient(180deg,#22C55E,#16A34A)":w.pct>0?"linear-gradient(180deg,#A78BFA,#7C3AED)":"#E2E8F0",borderRadius:"3px 3px 0 0",transition:"height .5s ease"}}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748B",marginTop:6,fontWeight:700}}><span>S1</span><span>S24</span><span>S48</span></div>
      </div>
    </div>
  );
}

function Card({id,num,esp,titulo,pags,tops,cor,ico,isRev,done,isQ,qlink,qnum,stat,onStat,isOpen,onToggle,onDone}) {
  const bg = done?"#F0FDF4":"#FFFFFF";
  const bc = done?"#86EFAC":isQ?cor+"55":"#E2E8F0";
  const bdr = isQ?"dashed":"solid";
  const q=stat?(Number(stat.q)||0):0, a=stat?(Number(stat.a)||0):0;
  const apr=q?Math.round(100*a/q):null;
  return (
    <div style={{background:bg,border:`1.5px ${bdr} ${bc}`,borderLeft:`4px solid ${done?"#22C55E":cor}`,borderRadius:13,overflow:"hidden",transition:"all .2s",boxShadow:done?"none":"0 1px 2px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",cursor:"pointer"}} onClick={onToggle}>
        <div style={{minWidth:32,height:32,borderRadius:9,background:done?"#22C55E":cor+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?15:13,color:done?"#fff":cor,fontWeight:900}}>{done?"✓":isQ?"?":num}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
            <span style={{fontSize:11,letterSpacing:.5,textTransform:"uppercase",color:cor,fontWeight:800}}>{ico} {esp}</span>
            {isQ && <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#DCFCE7",color:"#16A34A",fontWeight:800,textTransform:"uppercase"}}>questões</span>}
            {!isQ&&isRev && <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F1F5F9",color:"#64748B",fontWeight:700,textTransform:"uppercase"}}>revisão</span>}
            {qnum>0 && <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#FEF3C7",color:"#B45309",fontWeight:700}}>{qnum} no caderno</span>}
            {apr!==null && <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:pctColor(apr)+"22",color:pctColor(apr),fontWeight:900}}>{apr}% · {a}/{q}</span>}
          </div>
          <div style={{fontSize:15,fontWeight:800,color:done?"#64748B":"#1E293B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:done?"line-through":"none"}}>{titulo}</div>
          {pags && <div style={{fontSize:12,color:"#64748B",fontWeight:600,marginTop:2}}>📄 Páginas {pags}</div>}
        </div>
        <div style={{color:"#94A3B8",fontSize:15,transform:isOpen?"rotate(180deg)":"none",transition:".2s"}}>▾</div>
      </div>
      {isOpen && (
        <div style={{borderTop:"1px solid #E2E8F0",padding:"14px 16px"}}>
          {tops&&tops.length>0 && (
            <div style={{marginBottom:13}}>
              <div style={{fontSize:11,color:"#64748B",letterSpacing:1.5,textTransform:"uppercase",fontWeight:800,marginBottom:9}}>{isQ?"Revisar":"Tópicos"}</div>
              {tops.map((tp,i)=>(<div key={i} style={{display:"flex",gap:9,fontSize:14,color:"#475569",marginBottom:6,fontWeight:600}}><span style={{color:cor,fontSize:9,marginTop:5}}>●</span>{tp}</div>))}
            </div>
          )}
          {isQ && (
            <div style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:12,padding:"14px",marginBottom:12}}>
              <div style={{fontSize:11,color:"#64748B",letterSpacing:1.5,textTransform:"uppercase",fontWeight:800,marginBottom:11}}>Registro de questões</div>
              <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                <label style={{display:"flex",flexDirection:"column",gap:5,fontSize:13,color:"#475569",fontWeight:800}}>Questões feitas
                  <input type="number" min="0" value={stat?stat.q:""} onClick={(ev)=>ev.stopPropagation()} onChange={(ev)=>onStat("q",ev.target.value)} style={{width:100,padding:"10px",border:"2px solid #94A3B8",borderRadius:10,fontSize:17,fontWeight:800,textAlign:"center",background:"#fff",color:"#1E293B"}}/></label>
                <label style={{display:"flex",flexDirection:"column",gap:5,fontSize:13,color:"#16A34A",fontWeight:800}}>Acertos
                  <input type="number" min="0" value={stat?stat.a:""} onClick={(ev)=>ev.stopPropagation()} onChange={(ev)=>onStat("a",ev.target.value)} style={{width:100,padding:"10px",border:"2px solid #86EFAC",borderRadius:10,fontSize:17,fontWeight:800,textAlign:"center",background:"#fff",color:"#16A34A"}}/></label>
                {apr!==null && (<div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontSize:34,fontWeight:900,color:pctColor(apr),lineHeight:1}}>{apr}%</div><div style={{fontSize:12,color:"#64748B",fontWeight:700,marginTop:2}}>{a} de {q}</div></div>)}
              </div>
            </div>
          )}
          {isQ&&!qlink && <div style={{fontSize:13,color:"#64748B",marginBottom:12,padding:"10px 12px",background:"#F1F5F9",borderRadius:10,fontWeight:600}}>Acesse o caderno no Estratégia MED para este assunto.</div>}
          {qlink && <a href={qlink} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:7,marginBottom:12,padding:"10px 15px",background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:10,color:"#B45309",fontSize:14,fontWeight:800,textDecoration:"none"}}>✦ Abrir caderno{qnum>0?` (${qnum} questões)`:""}</a>}
          <button onClick={(ev)=>{ev.stopPropagation();onDone();}} style={{padding:"12px",borderRadius:11,border:"none",cursor:"pointer",fontSize:14,fontWeight:800,display:"block",width:"100%",
            background:done?"#F1F5F9":`linear-gradient(135deg,${cor},${cor}CC)`,color:done?"#64748B":"#fff",transition:"all .2s"}}>{done?"↩ Marcar como não feita":"✓ Concluir tarefa  +10 XP"}</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
